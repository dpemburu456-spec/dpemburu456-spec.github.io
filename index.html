<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cah Angon · Feed Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #2d7d46;
            --primary-light: #4CAF50;
            --primary-dark: #1e5a32;
            --bg: #f0f6f0;
            --card-bg: #ffffff;
            --text: #1e2a1e;
            --text-secondary: #3f4f3f;
            --border: #d4e0d4;
            --shadow: 0 4px 16px rgba(0, 20, 0, 0.06);
            --radius: 16px;
            --nav-bg: #ffffff;
            --input-bg: #f5faf5;
            --placeholder: #7a8f7a;
            --toast-bg: #1e2a1e;
            --admin-badge: #ff6b35;
            --feed-gap: 16px;
            --now-playing: #2d7d46;
        }

        .dark-mode {
            --bg: #121812;
            --card-bg: #1e2a1e;
            --text: #e8f0e8;
            --text-secondary: #b0c8b0;
            --border: #2f402f;
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            --nav-bg: #1a261a;
            --input-bg: #263226;
            --placeholder: #8aa08a;
            --toast-bg: #e8f0e8;
            --now-playing: #4CAF50;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            transition: background 0.3s, color 0.3s;
        }

        #app {
            max-width: 420px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
            min-height: 720px;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
        }

        .app-header {
            padding: 14px 18px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .app-header h2 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-header h2 i {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            background: var(--input-bg);
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 14px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-btn i {
            font-size: 16px;
        }

        .tab-content {
            flex: 1;
            padding: 0 0 80px 0;
            overflow-y: auto;
            max-height: 620px;
            background: var(--bg);
        }

        .tab-pane {
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeUp {
            0% { opacity: 0.3; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .feed-container {
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: var(--feed-gap);
        }

        .feed-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: 0.2s;
            scroll-margin-top: 10px;
        }

        .feed-item.now-playing {
            border-color: var(--now-playing);
            box-shadow: 0 0 0 2px var(--now-playing), var(--shadow);
        }

        .feed-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .feed-header {
            padding: 12px 14px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .feed-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feed-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .feed-user-info {
            display: flex;
            flex-direction: column;
        }

        .feed-username {
            font-weight: 600;
            font-size: 14px;
        }

        .feed-username .admin-badge {
            font-size: 10px;
            background: var(--admin-badge);
            color: #fff;
            padding: 1px 8px;
            border-radius: 30px;
            margin-left: 4px;
        }

        .feed-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .feed-type-badge {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 500;
            background: var(--input-bg);
            color: var(--text-secondary);
        }

        .feed-type-badge.video { color: #ff0000; background: #ff000015; }
        .feed-type-badge.audio { color: #1db954; background: #1db95415; }

        .feed-title {
            padding: 0 14px 8px;
            font-weight: 500;
            font-size: 15px;
            line-height: 1.4;
        }

        .feed-media {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            min-height: 200px;
        }

        .feed-media iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .feed-media .placeholder-icon {
            color: var(--placeholder);
            font-size: 48px;
            opacity: 0.3;
        }

        .feed-audio {
            padding: 14px;
            background: var(--input-bg);
        }

        .feed-audio audio {
            width: 100%;
            border-radius: 40px;
            background: var(--card-bg);
        }

        .feed-audio-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .feed-audio-info i {
            font-size: 28px;
            color: var(--primary);
        }

        .feed-audio-info div {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .feed-actions {
            padding: 8px 14px 12px;
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--border);
        }

        .feed-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 30px;
            transition: 0.2s;
        }

        .feed-actions button:hover {
            background: var(--input-bg);
        }

        .feed-actions .delete-btn {
            color: #d9534f;
            margin-left: auto;
        }

        .feed-actions .playing-indicator {
            color: var(--now-playing);
            font-weight: 600;
            font-size: 11px;
        }

        .add-container {
            padding: 16px;
        }

        .add-container .pane-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-container .pane-title .count-badge {
            font-size: 12px;
            background: var(--primary);
            color: #fff;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 500;
        }

        .add-form {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .add-form label {
            font-weight: 500;
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .add-form input, .add-form textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
            outline: none;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .add-form input:focus, .add-form textarea:focus {
            border-color: var(--primary);
        }

        .add-form textarea {
            resize: vertical;
            min-height: 50px;
            font-family: 'Poppins', sans-serif;
        }

        .add-form .btn-add {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-form .btn-add:active {
            transform: scale(0.97);
        }

        .login-prompt {
            text-align: center;
            padding: 30px 20px;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 2px dashed var(--border);
        }

        .login-prompt i {
            font-size: 48px;
            color: var(--primary);
            opacity: 0.5;
            margin-bottom: 12px;
        }

        .login-prompt h3 {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .login-prompt p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .login-prompt .btn-login-prompt {
            margin-top: 12px;
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 10px 30px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: var(--card-bg);
            border-radius: 24px;
            max-width: 380px;
            width: 100%;
            padding: 32px 24px;
            animation: modalIn 0.3s ease;
            position: relative;
        }

        @keyframes modalIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-box .logo-wrap {
            text-align: center;
            margin-bottom: 24px;
        }

        .modal-box .logo-wrap i {
            font-size: 40px;
            color: var(--primary);
            background: var(--input-bg);
            padding: 14px;
            border-radius: 50%;
        }

        .modal-box .logo-wrap h2 {
            font-size: 24px;
            margin-top: 8px;
        }

        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .modal-box input:focus {
            border-color: var(--primary);
        }

        .modal-box .btn-login-modal {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            color: #fff;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .modal-box .login-error-modal {
            color: #d9534f;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }

        .modal-box .close-modal {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .bottom-nav {
            background: var(--nav-bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 6px 4px 12px;
            position: sticky;
            bottom: 0;
            backdrop-filter: blur(4px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 500;
            gap: 1px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: 0.2s;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(45, 125, 70, 0.08);
            padding: 4px 16px;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--bg);
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
            z-index: 999;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }

        .empty-feed {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
        }

        .empty-feed i {
            font-size: 56px;
            opacity: 0.2;
            margin-bottom: 12px;
        }

        .empty-feed h3 {
            font-weight: 600;
            color: var(--text);
        }

        .tab-content::-webkit-scrollbar {
            width: 3px;
        }
        .tab-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* Auto-play indicator */
        .auto-play-badge {
            background: var(--primary);
            color: #fff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 480px) {
            #app { border-radius: 20px; min-height: 680px; }
            .feed-container { padding: 10px; gap: 14px; }
            .feed-title { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-header">
            <h2><i class="fas fa-leaf"></i> Cah Angon</h2>
            <div class="header-actions">
                <button class="header-btn" id="themeToggle" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="header-btn" id="authBtn" onclick="toggleAuth()">
                    <i class="fas fa-user"></i> <span id="authLabel">Login</span>
                </button>
            </div>
        </div>

        <div class="tab-content" id="tabContent">
            <!-- FEED -->
            <div class="tab-pane active" id="tabFeed">
                <div class="feed-container" id="feedContainer"></div>
            </div>

            <!-- TAMBAH VIDEO -->
            <div class="tab-pane" id="tabAddVideo">
                <div class="add-container">
                    <div class="pane-title">
                        <i class="fab fa-youtube" style="color:#ff0000;"></i> Tambah Video
                        <span class="count-badge" id="videoCount">0</span>
                    </div>
                    <div id="videoAddForm"></div>
                </div>
            </div>

            <!-- TAMBAH AUDIO -->
            <div class="tab-pane" id="tabAddAudio">
                <div class="add-container">
                    <div class="pane-title">
                        <i class="fas fa-headphones" style="color:#1db954;"></i> Tambah Audio
                        <span class="count-badge" id="audioCount">0</span>
                    </div>
                    <div id="audioAddForm"></div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" data-tab="tabFeed">
                <i class="fas fa-home"></i> Beranda
            </button>
            <button class="nav-item" data-tab="tabAddVideo">
                <i class="fab fa-youtube"></i> Video
            </button>
            <button class="nav-item" data-tab="tabAddAudio">
                <i class="fas fa-headphones"></i> Audio
            </button>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeLoginModal()">&times;</button>
            <div class="logo-wrap">
                <i class="fas fa-leaf"></i>
                <h2>Cah Angon</h2>
                <p style="font-size:13px; color:var(--text-secondary);">Login untuk menambahkan media</p>
            </div>
            <div class="login-error-modal" id="loginErrorModal">Email atau password salah</div>
            <input type="email" id="modalEmail" placeholder="Email" value="dpemburu456@gmail.com">
            <input type="password" id="modalPassword" placeholder="Password" value="cahangon123">
            <button class="btn-login-modal" onclick="handleModalLogin()">
                <i class="fas fa-arrow-right"></i> Masuk
            </button>
            <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-secondary);">
                Admin: dpemburu456@gmail.com / cahangon123
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ======================== GLOBAL STATE ========================
        let currentUser = null;
        let isAdmin = false;
        let darkMode = false;
        let feedData = [];
        let nextId = 1;
        let currentPlayingIndex = -1;
        let isAutoPlayEnabled = true;

        const ADMIN_EMAIL = 'dpemburu456@gmail.com';
        const ADMIN_PASS = 'cahangon123';

        const feedContainer = document.getElementById('feedContainer');
        const videoAddForm = document.getElementById('videoAddForm');
        const audioAddForm = document.getElementById('audioAddForm');
        const authLabel = document.getElementById('authLabel');
        const authBtn = document.getElementById('authBtn');
        const loginModal = document.getElementById('loginModal');
        const toastEl = document.getElementById('toast');

        // ======================== TOAST ========================
        function toast(msg, isError = false) {
            toastEl.textContent = msg;
            toastEl.style.background = isError ? '#d9534f' : 'var(--toast-bg)';
            toastEl.style.color = isError ? '#fff' : 'var(--bg)';
            toastEl.classList.add('show');
            clearTimeout(toastEl._hide);
            toastEl._hide = setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        // ======================== AUTH ========================
        function toggleAuth() {
            if (currentUser) {
                logout();
            } else {
                openLoginModal();
            }
        }

        function openLoginModal() {
            loginModal.classList.add('show');
            document.getElementById('modalEmail').focus();
        }

        function closeLoginModal() {
            loginModal.classList.remove('show');
        }

        function handleModalLogin() {
            const email = document.getElementById('modalEmail').value.trim();
            const pass = document.getElementById('modalPassword').value.trim();
            const errorEl = document.getElementById('loginErrorModal');

            if (!email || !pass) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'Email dan password wajib diisi';
                return;
            }
            if (!email.includes('@')) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'Email tidak valid';
                return;
            }
            if (pass.length < 6) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'Password minimal 6 karakter';
                return;
            }

            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                errorEl.style.display = 'none';
                isAdmin = true;
                currentUser = { email, role: 'admin' };
                sessionStorage.setItem('cahangon_user', btoa(JSON.stringify(currentUser)));
                closeLoginModal();
                updateAuthUI();
                renderAddForms();
                toast('Selamat datang Admin! 👑');
                return;
            }

            if (pass.length >= 6) {
                errorEl.style.display = 'none';
                isAdmin = false;
                currentUser = { email, role: 'user' };
                sessionStorage.setItem('cahangon_user', btoa(JSON.stringify(currentUser)));
                closeLoginModal();
                updateAuthUI();
                renderAddForms();
                toast(`Selamat datang, ${email.split('@')[0]}!`);
            } else {
                errorEl.style.display = 'block';
                errorEl.textContent = 'Password minimal 6 karakter';
            }
        }

        document.getElementById('modalPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleModalLogin();
        });
        document.getElementById('modalEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleModalLogin();
        });

        function logout() {
            sessionStorage.removeItem('cahangon_user');
            currentUser = null;
            isAdmin = false;
            currentPlayingIndex = -1;
            updateAuthUI();
            renderAddForms();
            renderFeed();
            toast('Anda telah keluar');
        }

        function checkSession() {
            const raw = sessionStorage.getItem('cahangon_user');
            if (raw) {
                try {
                    const data = JSON.parse(atob(raw));
                    if (data && data.email) {
                        currentUser = data;
                        isAdmin = data.role === 'admin';
                    }
                } catch (_) {}
            }
            updateAuthUI();
        }

        function updateAuthUI() {
            if (currentUser) {
                authLabel.textContent = currentUser.email.split('@')[0];
                authBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> <span id="authLabel">${currentUser.email.split('@')[0]}</span>`;
            } else {
                authLabel.textContent = 'Login';
                authBtn.innerHTML = `<i class="fas fa-user"></i> <span id="authLabel">Login</span>`;
            }
        }

        // ======================== FEED DATA ========================
        function loadFeed() {
            try {
                const data = JSON.parse(localStorage.getItem('cahangon_feed'));
                if (data && Array.isArray(data)) {
                    feedData = data;
                    nextId = feedData.length > 0 ? Math.max(...feedData.map(f => f.id)) + 1 : 1;
                } else {
                    feedData = [];
                    nextId = 1;
                }
            } catch(e) {
                feedData = [];
                nextId = 1;
            }
        }

        function saveFeed() {
            localStorage.setItem('cahangon_feed', JSON.stringify(feedData));
            renderFeed();
            updateCounts();
        }

        // ======================== EXTRACT VIDEO ID ========================
        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?#]+)/,
                /youtube\.com\/embed\/([^&?#]+)/
            ];
            for (let p of patterns) {
                const m = url.match(p);
                if (m) return m[1];
            }
            return null;
        }

        // ======================== ADD MEDIA ========================
        function addFeedItem(type, url, title, addedBy) {
            if (type === 'video') {
                const vidId = extractVideoId(url);
                if (!vidId) {
                    toast('Link YouTube tidak valid!', true);
                    return false;
                }
            }

            const item = {
                id: nextId++,
                type: type,
                url: url,
                title: title || (type === 'video' ? 'Video YouTube' : 'Audio'),
                addedBy: addedBy || (currentUser ? currentUser.email : 'anonymous'),
                addedAt: Date.now(),
                isAdmin: isAdmin
            };

            if (type === 'video') {
                item.videoId = extractVideoId(url);
            }

            feedData.unshift(item);
            saveFeed();
            
            // Auto-play: jika ini adalah media pertama, mulai putar
            if (feedData.length === 1) {
                setTimeout(() => playMedia(0), 500);
            }
            
            toast('Media berhasil ditambahkan ke Beranda! 🎉');
            return true;
        }

        // ======================== PLAY MEDIA ========================
        function playMedia(index) {
            if (index < 0 || index >= feedData.length) {
                // Jika sudah di akhir playlist, berhenti
                currentPlayingIndex = -1;
                renderFeed();
                toast('🏁 Selesai memutar semua media!');
                return;
            }

            const item = feedData[index];
            currentPlayingIndex = index;
            renderFeed();

            // Scroll ke media yang sedang diputar
            setTimeout(() => {
                const items = document.querySelectorAll('.feed-item');
                if (items[index]) {
                    items[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 300);

            // Putar media
            if (item.type === 'video') {
                playVideo(item, index);
            } else if (item.type === 'audio') {
                playAudio(item, index);
            }
        }

        function playVideo(item, index) {
            const container = document.getElementById(`video-${item.id}`);
            if (!container) return;

            // Cek apakah sudah ada iframe
            let iframe = container.querySelector('iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.setAttribute('allow', 'autoplay; encrypted-media');
                iframe.setAttribute('allowfullscreen', 'true');
                container.innerHTML = '';
                container.appendChild(iframe);
            }

            // Set src dengan autoplay
            iframe.src = `https://www.youtube.com/embed/${item.videoId}?autoplay=1&rel=0&enablejsapi=1`;

            // Deteksi akhir video dengan interval
            let checkInterval = setInterval(() => {
                try {
                    // Cek jika video sudah selesai dengan mendeteksi apakah iframe masih ada
                    // dan apakah video sudah berakhir (dengan mendeteksi state player)
                    // Karena kita tidak bisa akses YouTube API dari sini, kita gunakan pendekatan:
                    // Jika video sudah diputar lebih dari 5 detik, kita cek apakah masih ada
                    // aktivitas player
                } catch(e) {}
            }, 1000);

            // Simpan interval untuk dibersihkan nanti
            container._checkInterval = checkInterval;

            toast(`▶️ Memutar: ${item.title}`);

            // Set timeout untuk pindah ke video berikutnya (fallback jika tidak deteksi)
            // YouTube biasanya akan memutar video sampai selesai
            // Kita akan coba deteksi dengan cara: setelah 30 detik, cek apakah masih diputar
            let fallbackTimeout = setTimeout(() => {
                // Jika masih di video yang sama dan tidak ada interaksi, pindah ke next
                if (currentPlayingIndex === index) {
                    // Cek apakah video masih diputar dengan mendeteksi iframe
                    const currentIframe = container.querySelector('iframe');
                    if (currentIframe && currentIframe.src) {
                        // Video masih diputar, kita tunggu
                        // Kita tambahkan listener untuk deteksi
                        console.log('Video masih diputar, menunggu...');
                    }
                }
            }, 30000);

            container._fallbackTimeout = fallbackTimeout;

            // Event listener untuk deteksi akhir video (gunakan unload event)
            // Kita cek setiap 5 detik apakah video masih ada
            let lastCheck = Date.now();
            let checkEndInterval = setInterval(() => {
                if (currentPlayingIndex !== index) {
                    clearInterval(checkEndInterval);
                    return;
                }

                const currentIframe = container.querySelector('iframe');
                if (!currentIframe || !currentIframe.src) {
                    // Iframe hilang atau src kosong, berarti video sudah selesai
                    clearInterval(checkEndInterval);
                    playNext(index);
                    return;
                }

                // Cek jika sudah lebih dari 5 menit, pindah ke next (asumsi video selesai)
                if (Date.now() - lastCheck > 300000) { // 5 menit
                    clearInterval(checkEndInterval);
                    playNext(index);
                    return;
                }
            }, 5000);

            container._checkEndInterval = checkEndInterval;
        }

        function playAudio(item, index) {
            const container = document.getElementById(`audio-${item.id}`);
            if (!container) return;

            let audioEl = container.querySelector('audio');
            if (!audioEl) {
                audioEl = document.createElement('audio');
                audioEl.controls = true;
                audioEl.style.width = '100%';
                container.querySelector('.audio-wrapper').appendChild(audioEl);
            }

            audioEl.src = item.url;
            audioEl.load();
            
            // Event listener untuk audio ended
            audioEl.onended = function() {
                // Hapus listener agar tidak double
                audioEl.onended = null;
                playNext(index);
            };

            // Event listener untuk error
            audioEl.onerror = function() {
                toast('Gagal memutar audio, lanjut ke berikutnya...', true);
                audioEl.onended = null;
                playNext(index);
            };

            audioEl.play().then(() => {
                toast(`🎵 Memutar: ${item.title}`);
            }).catch((err) => {
                console.error('Audio play error:', err);
                toast('Gagal memutar audio, lanjut ke berikutnya...', true);
                playNext(index);
            });
        }

        function playNext(currentIndex) {
            const nextIndex = currentIndex + 1;
            if (nextIndex < feedData.length) {
                toast(`⏭️ Otomatis ke media berikutnya...`);
                setTimeout(() => {
                    playMedia(nextIndex);
                }, 1000);
            } else {
                // Sudah di akhir playlist
                currentPlayingIndex = -1;
                renderFeed();
                toast('🏁 Selesai memutar semua media!');
            }
        }

        // ======================== RENDER FEED ========================
        function renderFeed() {
            if (feedData.length === 0) {
                feedContainer.innerHTML = `
                    <div class="empty-feed">
                        <i class="fas fa-leaf"></i>
                        <h3>Belum ada media</h3>
                        <p style="font-size:13px;">Jadilah yang pertama menambahkan video atau audio!</p>
                        <p style="font-size:12px;margin-top:8px;color:var(--placeholder);">
                            <i class="fas fa-plus-circle"></i> Klik tab Video / Audio untuk menambah
                        </p>
                    </div>
                `;
                return;
            }

            feedContainer.innerHTML = feedData.map((item, index) => {
                const isOwner = item.addedBy === (currentUser ? currentUser.email : null);
                const canDelete = isAdmin || isOwner;
                const username = item.addedBy.split('@')[0];
                const isAdminUser = item.isAdmin || (item.addedBy === ADMIN_EMAIL);
                const timeAgo = getTimeAgo(item.addedAt);
                const isPlaying = currentPlayingIndex === index;
                
                let mediaHtml = '';
                if (item.type === 'video' && item.videoId) {
                    mediaHtml = `
                        <div class="feed-media" id="video-${item.id}">
                            ${isPlaying ? '' : `<iframe src="https://www.youtube.com/embed/${item.videoId}?rel=0" allow="encrypted-media" allowfullscreen></iframe>`}
                        </div>
                    `;
                } else if (item.type === 'audio') {
                    mediaHtml = `
                        <div class="feed-audio" id="audio-${item.id}">
                            <div class="feed-audio-info">
                                <i class="fas fa-compact-disc"></i>
                                <div>${item.title}</div>
                            </div>
                            <div class="audio-wrapper">
                                ${isPlaying ? `<audio controls src="${item.url}" style="width:100%;"></audio>` : ''}
                            </div>
                        </div>
                    `;
                }

                const typeLabel = item.type === 'video' ? 'Video' : 'Audio';
                const typeIcon = item.type === 'video' ? 'fab fa-youtube' : 'fas fa-headphones';
                const typeClass = item.type === 'video' ? 'video' : 'audio';

                const playingClass = isPlaying ? 'now-playing' : '';

                return `
                    <div class="feed-item ${playingClass}" data-index="${index}">
                        <div class="feed-header">
                            <div class="feed-user">
                                <div class="feed-avatar" style="background:${getColorFromEmail(item.addedBy)}">
                                    ${username.charAt(0).toUpperCase()}
                                </div>
                                <div class="feed-user-info">
                                    <div class="feed-username">
                                        ${username}
                                        ${isAdminUser ? '<span class="admin-badge">👑 Admin</span>' : ''}
                                    </div>
                                    <div class="feed-time">${timeAgo}</div>
                                </div>
                            </div>
                            <span class="feed-type-badge ${typeClass}">
                                <i class="${typeIcon}"></i> ${typeLabel}
                            </span>
                        </div>
                        <div class="feed-title">${item.title}</div>
                        ${mediaHtml}
                        <div class="feed-actions">
                            <button onclick="playMedia(${index})">
                                <i class="fas fa-${isPlaying ? 'pause' : 'play'}"></i> ${isPlaying ? 'Diputar' : 'Putar'}
                            </button>
                            ${isPlaying ? '<span class="playing-indicator"><i class="fas fa-circle" style="font-size:8px;color:var(--now-playing);"></i> Sedang diputar</span>' : ''}
                            <button onclick="shareMedia('${item.url}')">
                                <i class="fas fa-share-alt"></i> Bagikan
                            </button>
                            ${canDelete ? `<button class="delete-btn" onclick="deleteFeedItem(${item.id})"><i class="fas fa-trash"></i> Hapus</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Jika ada media yang sedang diputar, load ulang
            if (currentPlayingIndex >= 0 && currentPlayingIndex < feedData.length) {
                const item = feedData[currentPlayingIndex];
                if (item.type === 'video') {
                    const container = document.getElementById(`video-${item.id}`);
                    if (container) {
                        const iframe = container.querySelector('iframe');
                        if (!iframe || !iframe.src || iframe.src.includes('autoplay')) {
                            // Video belum dimuat dengan autoplay
                            playMedia(currentPlayingIndex);
                        }
                    }
                }
            }
        }

        function getTimeAgo(timestamp) {
            const diff = Date.now() - timestamp;
            const minutes = Math.floor(diff / 60000);
            if (minutes < 1) return 'Baru saja';
            if (minutes < 60) return `${minutes} menit lalu`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} jam lalu`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days} hari lalu`;
            return new Date(timestamp).toLocaleDateString('id-ID');
        }

        function getColorFromEmail(email) {
            const colors = ['#2d7d46', '#4CAF50', '#2196F3', '#9C27B0', '#FF5722', '#00BCD4', '#FF9800'];
            let hash = 0;
            for (let i = 0; i < email.length; i++) {
                hash = email.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function shareMedia(url) {
            if (navigator.share) {
                navigator.share({ title: 'Cah Angon', text: 'Cek media ini!', url: url });
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    toast('Link disalin ke clipboard!');
                }).catch(() => {
                    toast('Salin link: ' + url);
                });
            }
        }

        // ======================== DELETE ========================
        function deleteFeedItem(id) {
            const item = feedData.find(f => f.id === id);
            if (!item) return;
            
            const isOwner = item.addedBy === (currentUser ? currentUser.email : null);
            if (!isAdmin && !isOwner) {
                toast('Anda tidak bisa menghapus ini!', true);
                return;
            }
            
            if (confirm('Hapus media ini?')) {
                const index = feedData.findIndex(f => f.id === id);
                feedData = feedData.filter(f => f.id !== id);
                
                // Jika yang dihapus adalah media yang sedang diputar
                if (currentPlayingIndex === index) {
                    currentPlayingIndex = -1;
                } else if (currentPlayingIndex > index) {
                    currentPlayingIndex--;
                }
                
                saveFeed();
                toast('Media dihapus');
            }
        }

        // ======================== RENDER ADD FORMS ========================
        function renderAddForms() {
            const loggedIn = !!currentUser;
            
            videoAddForm.innerHTML = loggedIn ? `
                <div class="add-form">
                    <label>📹 Link YouTube</label>
                    <input type="text" id="videoUrlInput" placeholder="https://www.youtube.com/watch?v=xxx">
                    <label>📝 Judul Video</label>
                    <textarea id="videoTitleInput" placeholder="Tulis judul videonya..."></textarea>
                    <button class="btn-add" onclick="submitVideo()">
                        <i class="fas fa-plus-circle"></i> Tambahkan ke Beranda
                    </button>
                </div>
                <div style="font-size:12px;color:var(--text-secondary);text-align:center;">
                    <i class="fas fa-globe"></i> Media akan tampil di Beranda untuk semua orang
                </div>
            ` : getLoginPrompt();
            
            audioAddForm.innerHTML = loggedIn ? `
                <div class="add-form">
                    <label>🎵 Link Audio (MP3 / SoundCloud / Spotify)</label>
                    <input type="text" id="audioUrlInput" placeholder="https://example.com/audio.mp3">
                    <label>📝 Judul Audio</label>
                    <textarea id="audioTitleInput" placeholder="Tulis judul audionya..."></textarea>
                    <button class="btn-add" onclick="submitAudio()">
                        <i class="fas fa-plus-circle"></i> Tambahkan ke Beranda
                    </button>
                </div>
                <div style="font-size:12px;color:var(--text-secondary);text-align:center;">
                    <i class="fas fa-globe"></i> Media akan tampil di Beranda untuk semua orang
                </div>
            ` : getLoginPrompt();
        }

        function getLoginPrompt() {
            return `
                <div class="login-prompt">
                    <i class="fas fa-lock"></i>
                    <h3>Login untuk menambahkan media</h3>
                    <p>Hanya pengguna terdaftar yang bisa membagikan video dan audio.</p>
                    <button class="btn-login-prompt" onclick="openLoginModal()">
                        <i class="fas fa-sign-in-alt"></i> Login Sekarang
                    </button>
                </div>
            `;
        }

        // ======================== SUBMIT HANDLERS ========================
        function submitVideo() {
            const url = document.getElementById('videoUrlInput').value.trim();
            const title = document.getElementById('videoTitleInput').value.trim() || 'Video YouTube';
            if (!url) { toast('Masukkan link YouTube!', true); return; }
            if (!extractVideoId(url)) { toast('Link YouTube tidak valid!', true); return; }
            addFeedItem('video', url, title, currentUser.email);
            document.getElementById('videoUrlInput').value = '';
            document.getElementById('videoTitleInput').value = '';
            switchTab('tabFeed');
        }

        function submitAudio() {
            const url = document.getElementById('audioUrlInput').value.trim();
            const title = document.getElementById('audioTitleInput').value.trim() || 'Audio';
            if (!url) { toast('Masukkan link audio!', true); return; }
            addFeedItem('audio', url, title, currentUser.email);
            document.getElementById('audioUrlInput').value = '';
            document.getElementById('audioTitleInput').value = '';
            switchTab('tabFeed');
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.id === 'videoUrlInput') submitVideo();
                else if (active && active.id === 'audioUrlInput') submitAudio();
            }
        });

        // ======================== COUNTS ========================
        function updateCounts() {
            const videos = feedData.filter(f => f.type === 'video').length;
            const audios = feedData.filter(f => f.type === 'audio').length;
            document.getElementById('videoCount').textContent = videos;
            document.getElementById('audioCount').textContent = audios;
        }

        // ======================== NAVIGATION ========================
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabId = this.dataset.tab;
                switchTab(tabId);
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        function switchTab(tabId) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(tabId);
            if (target) target.classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => {
                b.classList.toggle('active', b.dataset.tab === tabId);
            });
            if (tabId === 'tabFeed') renderFeed();
        }

        // ======================== THEME ========================
        function toggleTheme() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark-mode', darkMode);
            const icon = document.getElementById('themeToggle').querySelector('i');
            icon.className = darkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('cahangon_theme', darkMode ? 'dark' : 'light');
            toast(darkMode ? 'Mode gelap' : 'Mode terang');
        }

        // ======================== INIT ========================
        function init() {
            const savedTheme = localStorage.getItem('cahangon_theme');
            if (savedTheme === 'dark') {
                darkMode = true;
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').querySelector('i').className = 'fas fa-sun';
            }
            
            checkSession();
            loadFeed();
            renderFeed();
            renderAddForms();
            updateCounts();
            
            // Jika ada media dan tidak sedang diputar, mulai dari awal
            if (feedData.length > 0 && currentPlayingIndex === -1) {
                setTimeout(() => {
                    // Tanya user apakah mau mulai autoplay
                    if (confirm('Mulai putar otomatis dari media pertama?')) {
                        playMedia(0);
                    }
                }, 1500);
            }
            
            if (!currentUser) {
                setTimeout(() => {
                    toast('👋 Login untuk menambahkan media!', false);
                }, 1000);
            }
        }

        loginModal.addEventListener('click', (e) => {
            if (e.target === loginModal) closeLoginModal();
        });

        init();
        console.log('🌿 Cah Angon dengan Auto-Play siap!');
    </script>
</body>
</html>
